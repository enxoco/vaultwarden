# Values common to all flavors
sso:
  enabled: true
  existingSecret: vaultwarden-sso
  authority: https://sso.###ZARF_VAR_DOMAIN###/realms/uds
  clientId: 
    value: uds-package-vaultwarden
domain: "vaultwarden.###ZARF_VAR_DOMAIN###"
storage:
  data:
    name: vaultwarden-data
    class: "###ZARF_VAR_STORAGE_CLASS###"
    size: "###ZARF_VAR_STORAGE_SIZE###"
    keepPvc: true
    accessMode: "ReadWriteOnce"

adminToken: 
  value: "###ZARF_VAR_ADMIN_TOKEN###"
signupsAllowed: false
image:
  extraVars:
    - key: DOMAIN
      value: "https://vaultwarden.###ZARF_VAR_DOMAIN###"
